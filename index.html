<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO - Music Player</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b0b0b;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .search-section {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            width: 70%;
            padding: 12px 20px;
            border-radius: 25px 0 0 25px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
        }

        button {
            width: 25%;
            padding: 12px;
            border-radius: 0 25px 25px 0;
            border: none;
            background: #ff0000;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #player-container {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; /* Ilki bilen gizlin */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-text {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="search-section">
        <h1 style="color: #ff0000;">KİNG ECHO</h1>
        <p>Aýdymyň adyny ýazyň we derrew diňläň</p>
        <div style="display: flex; justify-content: center;">
            <input type="text" id="songQuery" placeholder="Meselem: Janam janam...">
            <button onclick="playMusic()">Diňle</button>
        </div>
    </div>

    <div id="player-container">
        <iframe id="ytPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <p class="info-text">Bellik: Bu ulgam iň amatly netijäni awtomatiki tapyp berýär.</p>

    <script>
        function playMusic() {
            const query = document.getElementById('songQuery').value;
            const container = document.getElementById('player-container');
            const player = document.getElementById('ytPlayer');

            if (!query) {
                alert("Haýyş, aýdym adyny ýazyň!");
                return;
            }

            // API açarsyz iň gowy usul: YouTube Embed Search ulanmak
            // Bu "search_query" arkaly göni iň meşhur netijäni açýar
            const embedUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}&autoplay=1`;

            player.src = embedUrl;
            container.style.display = 'block'; // Pleýeri görkez
            
            // Sahypanyň pleýere tarap süýşmegi üçin
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // Enter düwmesine basylanda hem gözlesin
        document.getElementById('songQuery').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                playMusic();
            }
        });
    </script>

</body>
</html>
