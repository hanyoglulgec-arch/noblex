<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Music Search</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .search-box { margin-bottom: 20px; }
        input { padding: 12px; border-radius: 20px; border: none; width: 60%; outline: none; }
        button { padding: 12px 20px; border-radius: 20px; border: none; background: #ff0000; color: white; cursor: pointer; font-weight: bold; }
        .song-card { background: #111; margin: 10px auto; padding: 15px; border-radius: 10px; max-width: 400px; display: flex; align-items: center; border: 1px solid #333; }
        .song-card img { width: 60px; height: 60px; border-radius: 5px; margin-right: 15px; }
        .info { text-align: left; flex: 1; }
        .title { display: block; font-weight: bold; }
        .artist { font-size: 13px; color: #888; }
        audio { width: 100%; margin-top: 10px; height: 30px; }
    </style>
</head>
<body>

    <h2 style="color: #ff0000;">KİNG ECHO MUSIC</h2>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Aýdym ady ýazyň...">
        <button onclick="search()">GÖZLE</button>
    </div>

    <div id="results"></div>

    <script>
        async function search() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');

            if (!query) return;

            resultsDiv.innerHTML = "Garaşyň...";

            // CORS Proxy ulanylyp, iTunes-dan maglumat çekilýär
            const proxy = "https://api.allorigins.win/get?url=";
            const apiUrl = encodeURIComponent(`https://itunes.apple.com/search?term=${query}&media=music&limit=10`);

            try {
                const response = await fetch(proxy + apiUrl);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents); // AllOrigins JSON-y şeýle gaýtaryp berýär

                resultsDiv.innerHTML = "";

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = "Hiç zat tapylmady.";
                    return;
                }

                data.results.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.innerHTML = `
                        <img src="${track.artworkUrl100}">
                        <div class="info">
                            <span class="title">${track.trackName}</span>
                            <span class="artist">${track.artistName}</span>
                            <audio controls src="${track.previewUrl}"></audio>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (error) {
                resultsDiv.innerHTML = "Proxy baglanyşygynda ýalňyşlyk boldy. Täzeden gözläň.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
