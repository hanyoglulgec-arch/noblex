<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Mugt Aýdym Tap</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #080808;
            --card: #121212;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
        }

        .input-group {
            display: flex;
            background: var(--card);
            border-radius: 30px;
            padding: 5px;
            border: 1px solid #333;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 15px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: var(--primary);
            border: none;
            color: black;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        #results {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
        }

        .song-card {
            background: var(--card);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .song-card:hover {
            border-color: var(--primary);
            background: #1a1a1a;
        }

        .album-art {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            margin-right: 15px;
        }

        .info { flex: 1; }

        .title { font-weight: bold; font-size: 16px; margin-bottom: 5px; display: block; }
        .artist { color: #888; font-size: 14px; }

        .play-btn {
            background: #ff0000;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .audio-preview {
            width: 100%;
            margin-top: 10px;
            height: 30px;
        }
    </style>
</head>
<body>

    <h1 style="color: var(--primary);">KİNG ECHO</h1>
    <p style="color: #666;">Aýdymyň adyny ýa-da sözlerini ýazyň</p>

    <div class="search-container">
        <div class="input-group">
            <input type="text" id="query" placeholder="Meselem: Janym diýme...">
            <button onclick="searchMusic()">TAP</button>
        </div>
    </div>

    <div id="results">
        </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');

            if (!query) return;

            resultsDiv.innerHTML = "<p style='text-align:center'>Gözlenilýär...</p>";

            // iTunes API - Doly mugt we API Key gerek däl
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=10`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                resultsDiv.innerHTML = "";

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = "<p>Hiç zat tapylmady :(</p>";
                    return;
                }

                data.results.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    
                    card.innerHTML = `
                        <img src="${track.artworkUrl100}" class="album-art">
                        <div class="info">
                            <span class="title">${track.trackName}</span>
                            <span class="artist">${track.artistName}</span>
                            <audio controls class="audio-preview">
                                <source src="${track.previewUrl}" type="audio/mpeg">
                            </audio>
                        </div>
                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(track.trackName + ' ' + track.artistName)}" 
                           target="_blank" class="play-btn">▶</a>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (error) {
                resultsDiv.innerHTML = "<p>Internet baglanyşygyny barlaň.</p>";
            }
        }

        // Enter düwmesi
        document.getElementById('query').addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchMusic();
        });
    </script>

</body>
</html>
