<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Güýçli Saz Gözleg</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            margin-bottom: 5px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .search-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px 25px;
            font-size: 1.1rem;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #cc0000;
        }

        .player-wrapper {
            margin-top: 40px;
            width: 100%;
            max-width: 850px;
            display: none; /* Ilki gizlin */
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            border: 2px solid #222;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-bar {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KİNG ECHO</h1>
        <p>Advanced Music Search (No API Key Required)</p>
    </div>

    <div class="search-container">
        <input type="text" id="musicInput" placeholder="Aýdymyň adyny ýazyň...">
        <button onclick="searchAndPlay()">GÖZLE</button>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <div class="video-container">
            <iframe id="mainPlayer" 
                    src="" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="status-bar" id="statusText">
            Gözleg netijesi: iň gowy gabat gelýänler sanawy taýýarlandy.
        </div>
    </div>

    <script>
        function searchAndPlay() {
            const query = document.getElementById('musicInput').value.trim();
            const wrapper = document.getElementById('playerWrapper');
            const player = document.getElementById('mainPlayer');
            const status = document.getElementById('statusText');

            if (!query) {
                alert("Haýyş, aýdym adyny ýazyň!");
                return;
            }

            // Gözleg sözüni YouTube Playlist formatyna öwürýäris
            // listType=search söze iň gowy gabat gelýän aýdymlary sanaw hökmünde jemleýär
            const searchUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}&autoplay=1&rel=0`;

            player.src = searchUrl;
            wrapper.style.display = 'block';
            status.innerHTML = `Häzir diňlenilýär: <b>${query}</b> we meňzeş aýdymlar.`;
            
            // Sahypany aşak düşürýär
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Enter düwmesini goldamak
        document.getElementById('musicInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchAndPlay();
        });
    </script>

</body>
</html>
