<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Aýdym Gözleg Bot</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --primary: #ff0000;
            --text: #ffffff;
            --secondary: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* Gözleg Bölümi */
        .search-header {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .search-bar {
            display: flex;
            background: var(--card);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #333;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 16px;
        }

        .search-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Pleýer (Fixed Bottom) */
        #player-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 2px solid var(--primary);
            display: none;
            z-index: 1000;
        }

        /* Sanaw dizaýny (Bot stili) */
        .results-container {
            width: 100%;
            max-width: 600px;
            padding: 10px;
        }

        .song-card {
            background: var(--card);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .song-card:hover {
            background: #222;
            transform: translateY(-2px);
        }

        .thumb {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-weight: bold;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-author {
            font-size: 12px;
            color: var(--secondary);
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            margin-top: 50px;
            color: var(--primary);
            display: none;
        }
    </style>
</head>
<body>

    <div class="search-header">
        <h2 style="text-align: center; color: var(--primary);">KİNG ECHO MUSIC</h2>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Aýdymyň adyny ýazyň...">
            <button class="search-btn" onclick="fetchSongs()">GÖZLE</button>
        </div>
    </div>

    <div class="loading" id="loader">Gözlenilýär, garaşyň...</div>

    <div class="results-container" id="results">
        </div>

    <div id="player-container">
        <iframe id="youtubePlayer" width="100%" height="80" src="" frameborder="0" allow="autoplay"></iframe>
        <button onclick="closePlayer()" style="position: absolute; right: 5px; top: -25px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer;">✕ Ýap</button>
    </div>

    <script>
        async function fetchSongs() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!query) return;

            loader.style.display = 'block';
            resultsDiv.innerHTML = "";

            try {
                // Invidious API ulanýarys (YouTube üçin mugt Proxy)
                const response = await fetch(`https://invidious.snopyta.org/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                const data = await response.json();

                loader.style.display = 'none';

                data.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.onclick = () => playSong(video.videoId);

                    card.innerHTML = `
                        <img src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg" class="thumb">
                        <div class="song-info">
                            <div class="song-title">${video.title}</div>
                            <div class="song-author">${video.author}</div>
                        </div>
                        <div style="color: #ff0000; font-size: 20px;">▶</div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (error) {
                loader.innerHTML = "Ýalňyşlyk ýüze çykdy. Täzeden gözläp görüň.";
                console.error(error);
            }
        }

        function playSong(id) {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('youtubePlayer');
            
            // YouTube Music interfeýsine meňzeş kiçi pleýer
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&inline=1`;
            container.style.display = 'block';
        }

        function closePlayer() {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('youtubePlayer');
            iframe.src = "";
            container.style.display = 'none';
        }

        // Enter düwmesi
        document.getElementById('searchInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") fetchSongs();
        });
    </script>
</body>
</html>
