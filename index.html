<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Music Bot Web</title>
    <style>
        :root {
            --bg: #0e0e0e;
            --card: #1a1a1a;
            --primary: #ff0000;
            --text: #ffffff;
            --secondary: #888;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-wrapper {
            width: 100%;
            max-width: 500px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .search-box {
            display: flex;
            background: var(--card);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #333;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Player Style */
        #player-box {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            display: none;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--primary);
        }

        /* Results List (Bot Style) */
        .results-list {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .song-item {
            background: var(--card);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .song-item:hover {
            background: #252525;
            border-left-color: var(--primary);
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-weight: bold;
            font-size: 15px;
            display: block;
            margin-bottom: 3px;
        }

        .song-artist {
            font-size: 12px;
            color: var(--secondary);
        }

        .play-icon {
            color: var(--primary);
            font-size: 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="search-wrapper">
        <div class="search-box">
            <input type="text" id="query" placeholder="Aýdym ýa-da artist ady...">
            <button onclick="searchMusic()">GÖZLE</button>
        </div>
    </div>

    <div id="player-box">
        <iframe id="main-yt" width="100%" height="250" src="" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </div>

    <div class="results-list" id="results">
        </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');
            
            if (!query) return;

            resultsDiv.innerHTML = "<p style='text-align:center'>Gözlenilýär...</p>";

            // API Key-siz iň güýçli usul: DuckDuckGo ýa-da Suggest API arkaly gözleg simulýasiýasy
            // Ýöne brauzer üçin iň durnuklysy YouTube-yň öz RSS ýa-da Gözleg linkinden dinamiki çekmek
            // Bu ýerde biz Bot usulynda sanaw emele getirýäris:
            
            const searchTerms = [
                { title: `${query} (Official Audio)`, artist: "YouTube Music" },
                { title: `${query} (Slowed + Reverb)`, artist: "KİNG ECHO Edit" },
                { title: `${query} (Remix)`, artist: "Top Hit" },
                { title: `${query} (Lyrics)`, artist: "Karaoke" }
            ];

            resultsDiv.innerHTML = ""; // Arassala

            searchTerms.forEach(item => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.onclick = () => playThis(item.title);
                
                div.innerHTML = `
                    <div class="song-info">
                        <span class="song-title">${item.title}</span>
                        <span class="song-artist">${item.artist}</span>
                    </div>
                    <div class="play-icon">▶</div>
                `;
                resultsDiv.appendChild(div);
            });
        }

        function playThis(title) {
            const playerBox = document.getElementById('player-box');
            const iframe = document.getElementById('main-yt');
            
            // YouTube-yň "Auto-play first result" URL-ini ulanýarys
            const cleanTitle = encodeURIComponent(title);
            iframe.src = `https://www.youtube.com/embed?listType=search&list=${cleanTitle}&autoplay=1`;
            
            playerBox.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Enter düwmesi
        document.getElementById('query').addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchMusic();
        });
    </script>

</body>
</html>
