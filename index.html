<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KİNG ECHO | Music Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        h1 { color: #ff0000; font-size: 2rem; margin-bottom: 20px; }
        
        .search-box {
            display: flex;
            background: #1a1a1a;
            border-radius: 30px;
            padding: 5px;
            border: 1px solid #333;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 20px;
            outline: none;
            font-size: 16px;
        }
        button {
            background: #ff0000;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        #player-wrapper {
            margin-top: 30px;
            display: none; /* Ilki gizlin */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #ff0000;
        }

        iframe {
            width: 100%;
            height: 350px;
            border: none;
        }

        .bot-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            background: #111;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>KİNG ECHO MUSIC</h1>
    
    <div class="search-box">
        <input type="text" id="musicInput" placeholder="Aýdymyň adyny ýazyň...">
        <button onclick="findMusic()">TAP</button>
    </div>

    <div id="player-wrapper">
        <iframe id="ytPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="bot-msg" id="botStatus">
        @AydymGozle_bot stilinde aýdym gözleg ulgamy.
    </div>
</div>

<script>
    function findMusic() {
        const query = document.getElementById('musicInput').value;
        const playerWrapper = document.getElementById('player-wrapper');
        const player = document.getElementById('ytPlayer');
        const status = document.getElementById('botStatus');

        if (!query) {
            alert("Aýdym adyny ýazyň!");
            return;
        }

        // Iň güýçli mugt usul: YouTube Embed Search Playlist
        // Bu söze gabat gelýän aýdymlary bir pleýer edip jemleýär
        const embedUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}&autoplay=1`;

        player.src = embedUrl;
        playerWrapper.style.display = "block";
        status.innerHTML = `✅ <b>${query}</b> üçin netijeler tapyldy we pleýere goşuldy.`;
        
        // Ekrany pleýere tarap süýşürmek
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Enter düwmesini goldamak
    document.getElementById('musicInput').addEventListener("keypress", function(e) {
        if (e.key === "Enter") findMusic();
    });
</script>

</body>
</html>
