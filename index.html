<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saz Dünyäsi - Aýdym Gözleg</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #181818;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            text-align: center;
        }
        .search-input {
            width: 70%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 18px;
        }
        .search-btn {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background-color: #ff0000;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        #results {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .video-card {
            background: #282828;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .video-card:hover {
            background: #383838;
        }
        .video-card img {
            width: 100%;
            border-radius: 8px;
        }
        .video-title {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎵 Aýdym Tap</h1>
    <input type="text" id="query" class="search-input" placeholder="Aýdymyň adyny ýazyň...">
    <button class="search-btn" onclick="searchMusic()">Tap</button>

    <div id="results">
        </div>
</div>

<script>
    function searchMusic() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        
        if (!query) return alert("Söz ýazyň!");

        // Bu ýerde YouTube-yň resmi API-syny ýa-da gönüden-göni URL ugratmasyny ulanyp bilersiňiz
        // Häzirki wagtda iň ýönekeý usul: YouTube-a gönükdirmek
        window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`, '_blank');
    }
</script>

</body>
</html>
